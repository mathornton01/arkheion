# =============================================================================
# Arkheion — Kubernetes Service + Ingress manifests
# Namespace: host-services
# Node: optiplex-node-03 (192.168.1.122)
# Frontend: arkheion.thornt.com → port 7476
# Backend API: arkheion-api.thornt.com → port 7477
# =============================================================================

# --- Frontend Service --------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: arkheion
  namespace: host-services
spec:
  ports:
    - port: 7476
      targetPort: 7476
---
apiVersion: v1
kind: Endpoints
metadata:
  name: arkheion
  namespace: host-services
subsets:
  - addresses:
      - ip: 192.168.1.122
    ports:
      - port: 7476
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arkheion
  namespace: host-services
  annotations:
    herald.auto-ingress/node: optiplex-node-03
    herald.auto-ingress/port: "7476"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: arkheion.thornt.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: arkheion
                port:
                  number: 7476

---
# --- Backend API Service -----------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: arkheion-api
  namespace: host-services
spec:
  ports:
    - port: 7477
      targetPort: 7477
---
apiVersion: v1
kind: Endpoints
metadata:
  name: arkheion-api
  namespace: host-services
subsets:
  - addresses:
      - ip: 192.168.1.122
    ports:
      - port: 7477
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arkheion-api
  namespace: host-services
  annotations:
    herald.auto-ingress/node: optiplex-node-03
    herald.auto-ingress/port: "7477"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: arkheion-api.thornt.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: arkheion-api
                port:
                  number: 7477
